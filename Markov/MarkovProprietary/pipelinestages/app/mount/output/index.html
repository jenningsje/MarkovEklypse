<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="http://localhost:3001/output/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDB File Downloader</title>
  <style>
    body {
      background-color: rgb(60, 59, 59); /* Set the background color */
    }
    .button-84 {
      align-items: center;
      background-color: initial;
      background-image: linear-gradient(#464d55, #25292e);
      border-radius: 8px;
      border-width: 0;
      box-shadow: 0 10px 20px rgba(0, 0, 0, .1), 0 3px 6px rgba(0, 0, 0, .05);
      color: #fff;
      cursor: pointer;
      display: inline-flex;
      flex-direction: column;
      font-family: expo-brand-demi, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
      font-size: 18px;
      height: 52px;
      justify-content: center;
      line-height: 1;
      margin: 0;
      outline: none;
      padding: 0 32px;
      text-align: center;
      text-decoration: none;
      transition: all 150ms;
      vertical-align: baseline;
      white-space: nowrap;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      margin-top: 10px; /* Decreased space above the button */
    }

    .button-84:hover {
      box-shadow: rgba(0, 1, 0, .2) 0 2px 8px;
      opacity: .85;
    }

    .button-84:active {
      outline: 0;
    }

    .button-84:focus {
      box-shadow: rgba(0, 0, 0, .5) 0 0 0 3px;
    }

    @media (max-width: 420px) {
      .button-84 {
        height: 48px;
      }
    }
  </style>
</head>
<body>
  <button class="button-84" role="button">Download PDB File</button>
  <script>
    document.querySelector('.button-84').addEventListener('click', function() {
      window.location.href = '/download';  // Trigger download when the button is clicked
    });
  </script>
</body>
</html>
